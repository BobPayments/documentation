      responses:
        '200':
          description: Default Response
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    default: true
                    type: boolean
                  message:
                    type: string
                  data:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: string
                        externalId:
                          type: string
                        transactionCode:
                          nullable: true
                          type: string
                        status:
                          type: string
                          enum:
                          - waiting_payment
                          - paid
                          - refunded
                          - cancelled
                          - expired
                          - processing
                        amountCents:
                          type: number
                        product:
                          type: string
                        quantity:
                          type: number
                        paidAt:
                          nullable: true
                          type: string
                        createdAt:
                          type: string
                        updatedAt:
                          type: string
                        customer:
                          type: object
                          properties:
                            id:
                              type: string
                            name:
                              type: string
                            email:
                              type: string
                          required:
                          - id
                          - name
                          - email
                          additionalProperties: false
                        gateway:
                          type: object
                          properties:
                            id:
                              type: string
                            alias:
                              type: string
                            providerId:
                              type: string
                            providerName:
                              type: string
                          required:
                          - id
                          - alias
                          - providerId
                          - providerName
                          additionalProperties: false
                        originDomain:
                          nullable: true
                          type: string
                      required:
                      - id
                      - externalId
                      - transactionCode
                      - status
                      - amountCents
                      - product
                      - quantity
                      - paidAt
                      - createdAt
                      - updatedAt
                      - customer
                      - gateway
                      - originDomain
                      additionalProperties: false
                  meta:
                    type: object
                    properties:
                      total:
                        type: integer
                        minimum: -9007199254740991
                        maximum: 9007199254740991
                      page:
                        type: integer
                        minimum: -9007199254740991
                        maximum: 9007199254740991
                      limit:
                        type: integer
                        minimum: -9007199254740991
                        maximum: 9007199254740991
                      totalPages:
                        type: integer
                        minimum: -9007199254740991
                        maximum: 9007199254740991
                    required:
                    - total
                    - page
                    - limit
                    - totalPages
                    additionalProperties: false
                required:
                - success
                - data
                - meta
                additionalProperties: false
        '401':
          description: Default Response
          content:
            application/json:
              schema:
                type: object
                properties:
                  type:
                    type: string
                  title:
                    type: string
                  status:
                    type: integer
                    minimum: 400
                    maximum: 599
                  detail:
                    type: string
                  instance:
                    type: string
                  details:
                    type: object
                    additionalProperties: {}
                required:
                - type
                - title
                - status
                - detail
                - instance
                additionalProperties: false
        '500':
          description: Default Response
          content:
            application/json:
              schema:
                type: object
                properties:
                  type:
                    type: string
                  title:
                    type: string
                  status:
                    type: integer
                    minimum: 400
