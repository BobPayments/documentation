openapi: 3.0.3
info:
  title: Bob Payments API
  description: API de Gerenciamento e Monitoramento Bob Payments - Transações PIX
  version: 1.0.0
components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: Token JWT para endpoints autenticados do dashboard
    ApiKeyAuth:
      type: http
      scheme: bearer
      bearerFormat: API Key
      description: 'Autenticação por API Key usando token SK (sk_live_xxx ou sk_test_xxx).
        Envie como: Authorization: Bearer sk_live_xxx'
  schemas: {}
paths:
  /api/v1/transactions/:
    post:
      summary: Criar nova transação
      tags:
      - Transactions
      description: Cria uma nova transação PIX utilizando a estratégia de execução
        paralela de gateways.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                customer:
                  type: object
                  properties:
                    name:
                      type: string
                      minLength: 1
                      maxLength: 255
                    document:
                      type: string
                      minLength: 11
                      maxLength: 14
                    documentType:
                      type: string
                      enum:
                      - CPF
                      - CNPJ
                    email:
                      type: string
                      format: email
                      pattern: ^(?!\.)(?!.*\.\.)([A-Za-z0-9_'+\-\.]*)[A-Za-z0-9_+-]@([A-Za-z0-9][A-Za-z0-9\-]*\.)+[A-Za-z]{2,}$
                    phone:
                      type: string
                      minLength: 10
                      maxLength: 15
                    address:
                      type: object
                      properties:
                        street:
                          type: string
                          minLength: 1
                          maxLength: 255
                        streetNumber:
                          type: string
                          minLength: 1
                          maxLength: 20
                        complement:
                          type: string
                          maxLength: 100
                        neighborhood:
                          type: string
                          minLength: 1
                          maxLength: 100
                        zipCode:
                          type: string
                          minLength: 8
                          maxLength: 9
                        city:
                          type: string
                          minLength: 1
                          maxLength: 100
                        state:
                          type: string
                          minLength: 2
                          maxLength: 2
                        country:
                          default: BR
                          type: string
                          minLength: 2
                          maxLength: 2
                      required:
                      - street
                      - streetNumber
                      - neighborhood
                      - zipCode
                      - city
                      - state
                  required:
                  - name
                  - document
                  - documentType
                  - email
                  - phone
                  - address
                payment:
                  type: object
                  properties:
                    amountCents:
                      type: integer
                      minimum: 1
                      maximum: 50000000
                    product:
                      type: string
                      minLength: 1
                      maxLength: 255
                    quantity:
                      default: 1
                      type: integer
                      minimum: 1
                      maximum: 9007199254740991
                    expirationDays:
                      type: integer
                      minimum: 1
                      maximum: 30
                  required:
                  - amountCents
                  - product
                originDomain:
                  description: 'Domínio da loja/site que originou a transação (ex:
                    loja.exemplo.com.br). Obrigatório para rastreio de múltiplas lojas.
                    Use apenas o hostname, sem protocolo ou caminho.'
                  type: string
                  minLength: 1
                  maxLength: 253
                customerIp:
                  description: IP do usuário final que originou a requisição (IPv4
                    ou IPv6). Quando informado, é usado para detecção de fraude e
                    bloqueio de IPs.
                  anyOf:
                  - type: string
                    format: ipv4
                    pattern: ^(?:(?:25[0-5]|2[0-4][0-9]|1[0-9][0-9]|[1-9][0-9]|[0-9])\.){3}(?:25[0-5]|2[0-4][0-9]|1[0-9][0-9]|[1-9][0-9]|[0-9])$
                  - type: string
                    format: ipv6
                    pattern: ^(([0-9a-fA-F]{1,4}:){7}[0-9a-fA-F]{1,4}|([0-9a-fA-F]{1,4}:){1,7}:|([0-9a-fA-F]{1,4}:){1,6}:[0-9a-fA-F]{1,4}|([0-9a-fA-F]{1,4}:){1,5}(:[0-9a-fA-F]{1,4}){1,2}|([0-9a-fA-F]{1,4}:){1,4}(:[0-9a-fA-F]{1,4}){1,3}|([0-9a-fA-F]{1,4}:){1,3}(:[0-9a-fA-F]{1,4}){1,4}|([0-9a-fA-F]{1,4}:){1,2}(:[0-9a-fA-F]{1,4}){1,5}|[0-9a-fA-F]{1,4}:((:[0-9a-fA-F]{1,4}){1,6})|:((:[0-9a-fA-F]{1,4}){1,7}|:))$
              required:
              - customer
              - payment
              - originDomain
      security:
      - ApiKeyAuth: []
      responses:
        '201':
          description: Default Response
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    default: true
                    type: boolean
                  message:
                    type: string
                  data:
                    type: object
                    properties:
                      id:
                        type: string
                      pixCode:
                        type: string
                      expirationDate:
                        type: string
                      status:
                        type: string
                    required:
                    - id
                    - pixCode
                    - expirationDate
                    - status
                    additionalProperties: false
                required:
                - success
                - data
                additionalProperties: false
        '400':
          description: Default Response
          content:
            application/json:
              schema:
                type: object
                properties:
                  type:
                    type: string
                  title:
                    type: string
                  status:
                    type: integer
                    minimum: 400
                    maximum: 599
                  detail:
                    type: string
                  instance:
                    type: string
                  details:
                    type: object
                    additionalProperties: {}
                required:
                - type
                - title
                - status
                - detail
                - instance
                additionalProperties: false
        '401':
          description: Default Response
          content:
            application/json:
              schema:
                type: object
                properties:
                  type:
                    type: string
                  title:
                    type: string
                  status:
                    type: integer
                    minimum: 400
                    maximum: 599
                  detail:
                    type: string
                  instance:
                    type: string
                  details:
                    type: object
                    additionalProperties: {}
                required:
                - type
                - title
                - status
                - detail
                - instance
                additionalProperties: false
        '403':
          description: Default Response
          content:
            application/json:
              schema:
                type: object
                properties:
                  type:
                    type: string
                  title:
                    type: string
                  status:
                    type: integer
                    minimum: 400
                    maximum: 599
                  detail:
                    type: string
                  instance:
                    type: string
                  details:
                    type: object
                    additionalProperties: {}
                required:
                - type
                - title
                - status
                - detail
                - instance
                additionalProperties: false
        '404':
          description: Default Response
          content:
            application/json:
              schema:
                type: object
                properties:
                  type:
                    type: string
                  title:
                    type: string
                  status:
                    type: integer
                    minimum: 400
                    maximum: 599
                  detail:
                    type: string
                  instance:
                    type: string
                  details:
                    type: object
                    additionalProperties: {}
                required:
                - type
                - title
                - status
                - detail
                - instance
                additionalProperties: false
        '429':
          description: Default Response
          content:
            application/json:
              schema:
                type: object
                properties:
                  type:
                    type: string
                  title:
                    type: string
                  status:
                    type: integer
                    minimum: 400
                    maximum: 599
                  detail:
                    type: string
                  instance:
                    type: string
                  details:
                    type: object
                    additionalProperties: {}
                required:
                - type
                - title
                - status
                - detail
                - instance
                additionalProperties: false
        '500':
          description: Default Response
          content:
            application/json:
              schema:
                type: object
                properties:
                  type:
                    type: string
                  title:
                    type: string
                  status:
                    type: integer
                    minimum: 400
                    maximum: 599
                  detail:
                    type: string
                  instance:
                    type: string
                  details:
                    type: object
                    additionalProperties: {}
                required:
                - type
                - title
                - status
                - detail
                - instance
                additionalProperties: false
        '503':
          description: Default Response
          content:
            application/json:
              schema:
                type: object
                properties:
                  type:
                    type: string
                  title:
                    type: string
                  status:
                    type: integer
                    minimum: 400
                    maximum: 599
                  detail:
                    type: string
                  instance:
                    type: string
                  details:
                    type: object
                    properties:
                      retryAfterSeconds:
                        type: integer
                        description: Tempo recomendado de espera (em segundos) antes de tentar novamente
                        example: 30
                required:
                - type
                - title
                - status
                - detail
                - instance
                additionalProperties: false
    get:
      summary: Listar todas as transações
      tags:
      - Transactions
      description: Retorna uma lista paginada de transações com filtros opcionais.
        Suporta Bearer Token (sk_live_xxx / sk_test_xxx) ou autenticação JWT.
      parameters:
      - schema:
          default: 1
          type: integer
          exclusiveMinimum: true
          maximum: 9007199254740991
        in: query
        name: page
        required: false
      - schema:
          default: 10
          type: integer
          exclusiveMinimum: true
          maximum: 100
        in: query
        name: limit
        required: false
      - schema:
          type: string
          enum:
          - waiting_payment
          - paid
          - refunded
          - cancelled
          - expired
          - processing
        in: query
        name: status
        required: false
      - schema:
          type: string
          format: cuid
          pattern: ^[cC][^\s-]{8,}$
        in: query
        name: customerId
        required: false
      - schema: {}
        in: query
        name: dateFrom
        required: false
      - schema: {}
        in: query
        name: dateTo
        required: false
      - schema:
