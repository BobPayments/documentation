  /api/projects/{projectId}/ip-blacklist:
    post:
      summary: Block an IP address
      tags:
        - IP Blacklist
      description: Add an IP to the project blacklist. All transactions from this IP will be rejected with 403.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                ipAddress:
                  anyOf:
                    - type: string
                      format: ipv4
                      pattern: >-
                        ^(?:(?:25[0-5]|2[0-4][0-9]|1[0-9][0-9]|[1-9][0-9]|[0-9])\.){3}(?:25[0-5]|2[0-4][0-9]|1[0-9][0-9]|[1-9][0-9]|[0-9])$
                    - type: string
                      format: ipv6
                      pattern: >-
                        ^(([0-9a-fA-F]{1,4}:){7}[0-9a-fA-F]{1,4}|([0-9a-fA-F]{1,4}:){1,7}:|([0-9a-fA-F]{1,4}:){1,6}:[0-9a-fA-F]{1,4}|([0-9a-fA-F]{1,4}:){1,5}(:[0-9a-fA-F]{1,4}){1,2}|([0-9a-fA-F]{1,4}:){1,4}(:[0-9a-fA-F]{1,4}){1,3}|([0-9a-fA-F]{1,4}:){1,3}(:[0-9a-fA-F]{1,4}){1,4}|([0-9a-fA-F]{1,4}:){1,2}(:[0-9a-fA-F]{1,4}){1,5}|[0-9a-fA-F]{1,4}:((:[0-9a-fA-F]{1,4}){1,6})|:((:[0-9a-fA-F]{1,4}){1,7}|:))$
                reason:
                  type: string
                  minLength: 1
                  maxLength: 500
              required:
                - ipAddress
      parameters:
        - schema:
            type: string
            format: cuid
            pattern: ^[cC][^\s-]{8,}$
