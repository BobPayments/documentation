  /checkout/{shortCode}/transaction:
    post:
      summary: Create transaction via custom domain checkout
      tags:
        - Checkout
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                customer:
                  type: object
                  properties:
                    name:
                      type: string
                      minLength: 1
                      maxLength: 255
                    document:
                      type: string
                      minLength: 11
                      maxLength: 14
                    documentType:
                      type: string
                      enum:
                        - CPF
                        - CNPJ
                    email:
                      type: string
                      format: email
                      pattern: ^(?!\.)(?!.*\.\.)([A-Za-z0-9_'+\-\.]*)[A-Za-z0-9_+-]@([A-Za-z0-9][A-Za-z0-9\-]*\.)+[A-Za-z]{2,}$
                    phone:
                      type: string
                      minLength: 10
                      maxLength: 15
                    address:
                      type: object
                      properties:
                        street:
                          type: string
                          minLength: 1
                        streetNumber:
                          type: string
                          minLength: 1
                        complement:
                          type: string
                        neighborhood:
                          type: string
                          minLength: 1
                        zipCode:
                          type: string
                          minLength: 8
                          maxLength: 9
                        city:
                          type: string
                          minLength: 1
                        state:
                          type: string
                          minLength: 2
                          maxLength: 2
                        country:
                          default: BR
                          type: string
                          minLength: 2
                          maxLength: 2
                      required:
                        - street
                        - streetNumber
                        - neighborhood
                        - zipCode
                        - city
                        - state
                  required:
                    - name
                    - document
                    - documentType
                    - email
                    - phone
                    - address
                orderBumpProductIds:
                  default: []
                  type: array
                  items:
                    type: string
              required:
                - customer
      parameters:
        - schema:
            type: string
            minLength: 1
          in: path
          name: shortCode
          required: true
      responses:
        '201':
          description: Default Response
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    default: true
                    type: boolean
                  message:
                    type: string
                  data:
                    type: object
                    properties:
                      id:
                        type: string
                      pixCode:
                        type: string
                      expirationDate:
                        type: string
                      status:
                        type: string
                      amountCents:
                        type: number
                      product:
                        type: string
                      orderBumpsIncluded:
                        type: array
                        items:
                          type: string
                      createdAt:
                        type: string
                    required:
                      - id
                      - pixCode
                      - expirationDate
                      - status
                      - amountCents
                      - product
                      - orderBumpsIncluded
                      - createdAt
                    additionalProperties: false
                required:
                  - success
                  - data
                additionalProperties: false
        '400':
